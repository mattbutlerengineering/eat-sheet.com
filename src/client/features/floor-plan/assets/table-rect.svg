<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 48" width="100" height="48">
  <!-- Contact shadow -->
  <rect x="3" y="5" width="94" height="42" rx="6" fill="rgba(0,0,0,0.12)"/>
  <!-- Main wood rect -->
  <rect x="3" y="3" width="94" height="42" rx="6" fill="#8B7355"/>
  <!-- Horizontal grain lines -->
  <line x1="6" y1="13" x2="94" y2="13" stroke="#806A4E" stroke-width="1" opacity="0.30"/>
  <line x1="6" y1="23" x2="94" y2="23" stroke="#806A4E" stroke-width="1" opacity="0.25"/>
  <line x1="6" y1="33" x2="94" y2="33" stroke="#806A4E" stroke-width="1" opacity="0.30"/>
  <line x1="6" y1="43" x2="94" y2="43" stroke="#806A4E" stroke-width="1" opacity="0.25"/>
  <!-- Top edge highlight -->
  <line x1="8" y1="4" x2="92" y2="4" stroke="#9C8468" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Left edge highlight -->
  <line x1="4" y1="8" x2="4" y2="40" stroke="#9C8468" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Stroke -->
  <rect x="3" y="3" width="94" height="42" rx="6" fill="none" stroke="#6B5740" stroke-width="1"/>
</svg>
