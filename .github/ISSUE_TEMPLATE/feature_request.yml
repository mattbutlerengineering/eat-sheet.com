name: Enhancement
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - "Marketing site"
        - "Hospitality app"
        - "Users service"
        - "Reservations service"
        - "Agent service"
        - "Rialto design system"
        - "CI/CD"
        - "Developer experience"
        - "Other"
    validations:
      required: true
