<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hospitality management platform for restaurants — reservations, waitlist, floor plans, and guest management." />
    <meta name="theme-color" content="#1e1c1a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Eat Sheet</title>
    <style>
      body { margin: 0; background: #1e1c1a; }
      /* Accessible focus indicators for keyboard navigation */
      :focus-visible {
        outline: 2px solid var(--rialto-accent, #c49a2a);
        outline-offset: 2px;
      }
      /* Remove default outline for mouse clicks */
      :focus:not(:focus-visible) {
        outline: none;
      }
      /* Make Rialto Select labels look clickable */
      button[role="combobox"] + [role="listbox"],
      span + button[role="combobox"] { cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Remove stale service workers from v1 PWA
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) {
            registration.unregister();
          });
        });
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
    </script>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
